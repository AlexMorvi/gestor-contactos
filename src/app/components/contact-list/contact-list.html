<div class="container">
  <header class="list-header">
    <p class="eyebrow">Agenda personal</p>
    <h2>Mi Lista de Contactos</h2>
    <p class="subtitle">Organiza tu red, marca favoritos y actualiza estados al instante.</p>
  </header>

  @if (contacts.length === 0) {
    <div class="empty-state">
      <p>No hay contactos disponibles en este momento.</p>
    </div>
  } @else {
    <p class="counter">Total: {{ contacts.length }} contactos</p>
    <div class="grid-container">
      @for (contact of contacts; track contact.id) {
        <app-contact-card
          [class.selected-card]="selectedContact.id === contact.id"
          [contact]="contact"
          (favoriteToggled)="toggleFavorite($event)"
          (statusToggled)="toggleStatus($event)"
          (detailRequested)="selectContact($event)"
        ></app-contact-card>
      }
    </div>
    <app-contact-detail [contact]="selectedContact"></app-contact-detail>
  }
</div>
